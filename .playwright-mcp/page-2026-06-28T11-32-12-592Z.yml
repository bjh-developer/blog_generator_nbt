        - generic [ref=e222]:
          - paragraph [ref=e223]: Lesson 02
          - heading "Suppliers will use your platform for everything — not just the problem you solved." [level=3] [ref=e224]
          - paragraph [ref=e225]: TreeDots started as a surplus-only marketplace, but suppliers quickly routed all their volume through it because multi-supplier route density made every delivery cheaper. Building for one use case unlocked a much bigger logistics platform.
          - generic [ref=e226]:
            - img [ref=e227]
            - text: Marketplace founders wondering how to expand beyond the initial niche
        - generic [ref=e230]:
          - paragraph [ref=e231]: Lesson 03
          - heading "B2B and B2C can kill each other inside the same company." [level=3] [ref=e232]
          - paragraph [ref=e233]: TreeDots shut down its consumer group-buying service in 2022 because the unit economics and operational rhythms conflicted with the enterprise business. Saying no to a revenue line is the kind of discipline that keeps startups alive.
