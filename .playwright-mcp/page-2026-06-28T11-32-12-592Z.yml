          - heading "One container of avocados revealed a billion-dollar blind spot." [level=3] [ref=e216]
          - paragraph [ref=e217]: Nicholas rerouted a distressed shipment against spoilage and found a buyer instantly — proving that food waste is a logistics and information problem, not a supply problem. The best founding insights often hide inside a single painful transaction.
          - generic [ref=e218]:
