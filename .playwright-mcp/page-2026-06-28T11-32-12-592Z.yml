        - text: Founder mode
      - heading "The avocado deal that started it all" [level=2] [ref=e203]
      - paragraph [ref=e204]: Nicholas Lim watched a coworker struggle to ship a full container of Mexican av. He rerouted it to the Philippines, renegotiated the price down against spoilage, and found a buyer immediately — exposing a system where tons of perfectly good food are dumped due to inefficient logistics, outdated regulations, and mismatched buyer expectations. He brought the insight to friends Tyler Jong and Jiacai Lau, and TreeDots launched in 2017 as a simple online marketplace connecting surplus produce with F&B buyers who didn't care what the food looked like, only what it cost.
